<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Your Review</title>
  <style>
    body{margin:0;padding:12px;background:#f7f7f8;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    .card{max-width:560px;margin:10px auto;background:#fff;border:1px solid #e8e8e8;border-radius:16px;box-shadow:0 6px 18px rgba(0,0,0,.06);overflow:hidden}
    .head{padding:14px;border-bottom:1px solid #f0f0f0}
    .title{font-weight:900;font-size:16px}
    .sub{margin-top:4px;color:#666;font-size:13px}
    .status{padding:10px 14px;color:#555;font-size:13px;display:flex;gap:10px;align-items:center}
    .spin{width:14px;height:14px;border-radius:50%;border:2px solid #ddd;border-top-color:#444;display:none;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .panel{padding:12px 14px 14px;display:none}
    .row{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .label{font-size:13px;font-weight:900;color:#222}
    .copy{height:40px;padding:0 12px;border-radius:12px;border:1px solid #e6e6e7;background:#fff;cursor:pointer;display:flex;align-items:center;gap:8px}
    textarea{width:100%;box-sizing:border-box;padding:12px;border-radius:14px;border:1px solid #e2e2e2;font-size:15px;line-height:1.45;min-height:140px;resize:vertical}
    .photos{display:none;gap:8px;margin-bottom:10px}
    .photosRow{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
    .tile{position:relative;flex:0 0 auto;width:92px;height:92px;border-radius:16px;overflow:hidden;border:1px solid #e7e7e7;background:#f4f4f5}
    .tile img{width:100%;height:100%;object-fit:cover;display:block}
    .save{position:absolute;top:8px;right:8px;width:32px;height:32px;border-radius:12px;border:1px solid rgba(255,255,255,.65);
      background:rgba(0,0,0,.45);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
  </style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div class="title">Your review is ready in seconds</div>
      <div class="sub">Copy & paste into Google. Add photos if you’d like.</div>
    </div>

    <div class="status">
      <span id="spin" class="spin"></span>
      <span id="statusText">Loading…</span>
    </div>

    <div id="panel" class="panel">
      <div id="photos" class="photos">
        <div class="row">
          <div class="label">Job photos</div>
          <div id="photoCount" style="color:#666;font-size:12.5px"></div>
        </div>
        <div id="photosRow" class="photosRow"></div>
      </div>

      <div class="row" style="margin-bottom:8px">
        <div class="label">Generated review</div>
        <button id="copyBtn" class="copy" type="button">
          <span id="copyIcon">⧉</span>
          <span id="copyText">Copy me</span>
        </button>
      </div>

      <textarea id="reviewText" readonly></textarea>
    </div>
  </div>

  <script src="/assets/js/widget.js" defer></script>
</body>
</html>
